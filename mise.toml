[tools]
rust = "latest"
bun = "latest"

[tasks.fmt]
description = "Format Rust and TypeScript sources"
run = [
  "cargo fmt --all",
  "bun run --cwd apps/web fmt || true"
]

[tasks.lint]
description = "Lint Rust and TypeScript"
run = [
  "cargo clippy --workspace --all-targets --locked -- -D warnings",
  "bun run --cwd apps/web lint"
]

[tasks.test]
description = "Run Rust tests and web type checks"
run = [
  "cargo test --workspace --locked",
  "bun run --cwd apps/web typecheck"
]

[tasks.build]
description = "Build Rust release binaries and the web app"
run = [
  "cargo build --release --locked",
  "bun run --cwd apps/web build"
]

[tasks."dev:web"]
description = "Start the web app development server"
run = "bun run --cwd apps/web dev"

[tasks."dev:daemon"]
description = "Run the dllmd daemon (append args with --)"
run = "cargo run --release --bin dllmd"

[tasks."dev:cli"]
description = "Run the dllm CLI (append args with --)"
run = "cargo run --release --bin dllm"

[tasks."dev:gpu-nodes"]
description = "Start the owner GPU dev node (docker compose, GPU 0)"
run = "mkdir -p .dev-gpu/node-a .dev-gpu/node-b && docker compose -f docker-compose.dev-gpu.yml pull node-a && docker compose -f docker-compose.dev-gpu.yml up -d --no-build node-a"

[tasks."dev:gpu-image:build"]
description = "Build the CUDA dev image locally"
run = "docker build -f docker/Dockerfile.cuda-runtime --build-arg CUDA_ARCHITECTURES=61 -t dllm:cuda-runtime-sm61-v1 . && docker build -f docker/Dockerfile.dllmd --target runtime-cuda --build-arg CUDA_RUNTIME_IMAGE=dllm:cuda-runtime-sm61-v1 -t dllm:cuda-sm61 ."

[tasks."dev:gpu-nodes:local"]
description = "Start the owner GPU dev node from the local CUDA image"
run = "mkdir -p .dev-gpu/node-a .dev-gpu/node-b && DLLM_DEV_GPU_IMAGE=dllm:cuda-sm61 DLLM_DEV_GPU_PULL_POLICY=never docker compose -f docker-compose.dev-gpu.yml up -d --no-build node-a"

[tasks."dev:gpu-nodes:down"]
description = "Stop the GPU dev nodes"
run = "docker compose -f docker-compose.dev-gpu.yml down"

[tasks.ci]
description = "Full CI check"
depends = ["fmt", "lint", "test", "build"]
