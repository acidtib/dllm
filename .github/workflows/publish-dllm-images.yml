# Builds and publishes every DLLM image (cpu, vulkan, and cuda for each
# supported architecture) from source in one pass. cargo-chef caches the
# dependency build, including the expensive CUDA llama.cpp compile, in a durable
# registry build cache, so app-only changes rebuild in minutes and only the
# dependency change (or a cold cache) pays the full compile.
name: Publish DLLM images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Serialize image publishing so concurrent runs cannot race on the same tags.
concurrency:
  group: publish-images

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.tag }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: cpu
            target: runtime-cpu
          - tag: vulkan
            target: runtime-vulkan
          - tag: cuda-sm61
            target: runtime-cuda
            cuda_arch: "61"
          - tag: cuda-sm70
            target: runtime-cuda
            cuda_arch: "70"
          - tag: cuda-sm75
            target: runtime-cuda
            cuda_arch: "75"
          - tag: cuda-sm80
            target: runtime-cuda
            cuda_arch: "80"
          - tag: cuda-sm86
            target: runtime-cuda
            cuda_arch: "86"
          - tag: cuda-sm89
            target: runtime-cuda
            cuda_arch: "89"
          - tag: cuda-sm90
            target: runtime-cuda
            cuda_arch: "90"
          - tag: cuda-sm100
            target: runtime-cuda
            cuda_arch: "100"
          - tag: cuda-sm120
            target: runtime-cuda
            cuda_arch: "120"
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dllmd
          target: ${{ matrix.target }}
          build-args: |
            CUDA_ARCHITECTURES=${{ matrix.cuda_arch }}
          push: true
          # The unqualified cuda tag tracks the highest supported architecture.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-${{ github.sha }}
            ${{ matrix.tag == 'cuda-sm120' && format('{0}/{1}:cuda', env.REGISTRY, env.IMAGE_NAME) || '' }}
            ${{ matrix.tag == 'cuda-sm120' && format('{0}/{1}:cuda-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) || '' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.tag }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.tag }},mode=max
          provenance: mode=max
          sbom: true
