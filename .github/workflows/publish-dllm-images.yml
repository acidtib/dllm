# Publishes the cpu, vulkan, and cuda-sm61 app images for app-only changes that
# do not touch the CUDA base. The cuda-sm61 tag is also produced by
# "Rebuild CUDA runtime bases" after a base rebuild; both workflows own it.
name: Publish DLLM images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Serialize image publishing so concurrent runs cannot race on the same tags.
concurrency:
  group: publish-images

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            target: runtime-cpu
            cuda_runtime_image: ghcr.io/acidtib/dllm:cuda-runtime-sm61-v2
          - variant: cuda-sm61
            target: runtime-cuda
            cuda_runtime_image: ghcr.io/acidtib/dllm:cuda-runtime-sm61-v2
          - variant: vulkan
            target: runtime-vulkan
            cuda_runtime_image: ghcr.io/acidtib/dllm:cuda-runtime-sm61-v2
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dllmd
          target: ${{ matrix.target }}
          build-args: |
            CUDA_RUNTIME_IMAGE=${{ matrix.cuda_runtime_image }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-${{ github.sha }}
          cache-from: type=gha,scope=dllm-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=dllm-${{ matrix.variant }}
          provenance: mode=max
          sbom: true
