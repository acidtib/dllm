# Builds the CUDA runtime base image per architecture and the matching app
# image (cuda-<arch>). Run this only when the CUDA base changes (see
# docs/releasing.md). The cuda-sm61 app tag is also produced by
# "Publish DLLM images" for app-only changes that do not touch the base.
name: Rebuild CUDA runtime bases

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: CUDA architecture to build
        required: true
        default: all
        type: choice
        options:
          - all
          - sm61
          - sm70
          - sm75
          - sm80
          - sm86
          - sm89
          - sm90
          - sm100
          - sm120
      runtime_version:
        description: Runtime version tag, increment when app or llama.cpp sources change
        required: true
        default: v2
        type: string

permissions:
  contents: read
  packages: write

# Serialize image publishing so concurrent runs cannot race on the same tags.
concurrency:
  group: publish-images

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CUDA_RUNTIME_VERSION: ${{ inputs.runtime_version }}

jobs:
  build:
    name: Build CUDA runtime ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: inputs.architecture == 'all' || inputs.architecture == matrix.name
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sm61
            architectures: "61"
          - name: sm70
            architectures: "70"
          - name: sm75
            architectures: "75"
          - name: sm80
            architectures: "80"
          - name: sm86
            architectures: "86"
          - name: sm89
            architectures: "89"
          - name: sm90
            architectures: "90"
          - name: sm100
            architectures: "100"
          - name: sm120
            architectures: "120"
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cuda-runtime
          build-args: CUDA_ARCHITECTURES=${{ matrix.architectures }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda-runtime-${{ matrix.name }}-${{ env.CUDA_RUNTIME_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda-runtime-${{ matrix.name }}
          cache-from: type=gha,scope=cuda-runtime-${{ matrix.name }}-${{ env.CUDA_RUNTIME_VERSION }}
          cache-to: type=gha,mode=max,scope=cuda-runtime-${{ matrix.name }}-${{ env.CUDA_RUNTIME_VERSION }}
          provenance: mode=max
          sbom: true

      - name: Build and push DLLM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dllmd
          target: runtime-cuda
          build-args: CUDA_RUNTIME_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda-runtime-${{ matrix.name }}-${{ env.CUDA_RUNTIME_VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda-${{ matrix.name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda-${{ matrix.name }}-${{ github.sha }}
            ${{ matrix.name == 'sm120' && format('{0}/{1}:cuda', env.REGISTRY, env.IMAGE_NAME) || '' }}
            ${{ matrix.name == 'sm120' && format('{0}/{1}:cuda-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) || '' }}
          cache-from: type=gha,scope=dllm-cuda-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=dllm-cuda-${{ matrix.name }}
          provenance: mode=max
          sbom: true
