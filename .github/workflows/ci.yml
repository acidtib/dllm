name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web build
      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  check:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v7
      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install CMake and C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libclang-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: git diff --check

  build:
    runs-on: ubuntu-latest
    needs: [check, web]
    steps:
      - uses: actions/checkout@v7
      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install CMake and C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libclang-dev
      - run: cargo build --release --locked
      - run: cargo run --release --bin dllmd -- --help
      - run: cargo run --release --bin dllm -- --help
