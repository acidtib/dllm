services:
  node-a:
    image: ${DLLM_DEV_GPU_IMAGE:-ghcr.io/acidtib/dllm:cuda-sm61}
    pull_policy: ${DLLM_DEV_GPU_PULL_POLICY:-always}
    network_mode: host
    environment:
      DLLMD_NETWORK: dev-gpu-mesh
      DLLMD_MANAGEMENT_TOKEN: node-a-token
      DLLMD_API_KEY: node-a-key
      DLLMD_GPU_LAYERS: "38"
      DLLMD_BIND: 127.0.0.1:7337
      DLLMD_RUNTIME_PORT: "8081"
      DLLMD_P2P_ENABLED: "true"
      DLLMD_P2P_PORT: "7444"
    volumes:
      - ./.dev-gpu/node-a:/var/lib/dllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: ["gpu"]

  node-b:
    image: ${DLLM_DEV_GPU_IMAGE:-ghcr.io/acidtib/dllm:cuda-sm61}
    pull_policy: ${DLLM_DEV_GPU_PULL_POLICY:-always}
    network_mode: host
    environment:
      DLLMD_MANAGEMENT_TOKEN: node-b-token
      DLLMD_BIND: 127.0.0.1:7338
      DLLMD_RUNTIME_PORT: "8082"
      DLLMD_P2P_ENABLED: "true"
      DLLMD_P2P_PORT: "7445"
      DLLMD_P2P_BOOTSTRAP: /ip4/127.0.0.1/tcp/7444
    volumes:
      - ./.dev-gpu/node-b:/var/lib/dllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: ["gpu"]
